# =============================================================================
# Ventia Production — Nginx Reverse Proxy (Frontend)
# Instalado en la VM directamente (no en Docker)
# Copiar a:  /etc/nginx/sites-available/ventia-frontend.conf
# Symlink:   ln -s /etc/nginx/sites-available/ventia-frontend.conf /etc/nginx/sites-enabled/
#
# El cert se emite con:
#   sudo certbot --nginx -d ventia-latam.com -d www.ventia-latam.com
# (requiere que el DNS de ventia-latam.com ya apunte a la IP de esta VM)
# =============================================================================

# --- HTTP → HTTPS redirect + ACME challenge ---
server {
    listen 80;
    server_name ventia-latam.com www.ventia-latam.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- ventia-latam.com → Frontend (Next.js) ---
server {
    listen 443 ssl;
    server_name ventia-latam.com www.ventia-latam.com;

    ssl_certificate /etc/letsencrypt/live/ventia-latam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ventia-latam.com/privkey.pem;

    client_max_body_size 50M;

    # ActiveStorage media files — proxy to messaging service
    location /rails/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
