# =============================================================================
# Ventia Staging Stack — MV Agentes AI
# Nginx + Certbot run on the VM directly (not in Docker)
# =============================================================================

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: ventia-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ventia_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: ventia-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ../..
      dockerfile: docker/backend.Dockerfile
    container_name: ventia-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ventia_db}
      ENVIRONMENT: ${ENVIRONMENT:-staging}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://staging.ventia-latam.com"]}
      # Auth0
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_ISSUER: ${AUTH0_ISSUER}
      AUTH0_ALGORITHM: ${AUTH0_ALGORITHM:-RS256}
      AUTH0_CONNECTION: ${AUTH0_CONNECTION:-Username-Password-Authentication}
      AUTH0_MANAGEMENT_CLIENT_ID: ${AUTH0_MANAGEMENT_CLIENT_ID}
      AUTH0_MANAGEMENT_CLIENT_SECRET: ${AUTH0_MANAGEMENT_CLIENT_SECRET}
      AUTH0_MANAGEMENT_AUDIENCE: ${AUTH0_MANAGEMENT_AUDIENCE}
      # Webhooks
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-https://staging-api.ventia-latam.com}
      # Messaging
      MESSAGING_SERVICE_URL: http://messaging:3001
      MESSAGING_SERVICE_API_KEY: ${MESSAGING_SERVICE_API_KEY:-}
      # eFact
      EFACT_BASE_URL: ${EFACT_BASE_URL:-}
      EFACT_RUC_VENTIA: ${EFACT_RUC_VENTIA:-}
      EFACT_PASSWORD_REST: ${EFACT_PASSWORD_REST:-}
      # Resend
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # --- Frontend (Next.js) ---
  frontend:
    build:
      context: ../..
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://staging-api.ventia-latam.com/api/v1}
        NEXT_PUBLIC_MESSAGING_WS_URL: ${NEXT_PUBLIC_MESSAGING_WS_URL:-wss://staging-ws.ventia-latam.com/cable}
        NEXT_PUBLIC_AUTH0_DOMAIN: ${NEXT_PUBLIC_AUTH0_DOMAIN}
        NEXT_PUBLIC_AUTH0_CLIENT_ID: ${NEXT_PUBLIC_AUTH0_CLIENT_ID}
        NEXT_PUBLIC_AUTH0_AUDIENCE: ${NEXT_PUBLIC_AUTH0_AUDIENCE}
        AUTH0_DOMAIN: ${AUTH0_DOMAIN}
        AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
        AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
        AUTH0_SECRET: ${AUTH0_SECRET}
        AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_VAPID_KEY: ${NEXT_PUBLIC_FIREBASE_VAPID_KEY:-}
        NEXT_PUBLIC_WHATSAPP_APP_ID: ${NEXT_PUBLIC_WHATSAPP_APP_ID:-}
        NEXT_PUBLIC_WHATSAPP_CONFIGURATION_ID: ${NEXT_PUBLIC_WHATSAPP_CONFIGURATION_ID:-}
        NEXT_PUBLIC_WHATSAPP_API_VERSION: ${NEXT_PUBLIC_WHATSAPP_API_VERSION:-v22.0}
    container_name: ventia-frontend
    environment:
      AUTH0_SECRET: ${AUTH0_SECRET}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN}
      AUTH0_BASE_URL: ${AUTH0_BASE_URL:-https://staging.ventia-latam.com}
      AUTH0_ISSUER_BASE_URL: ${AUTH0_ISSUER_BASE_URL}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://staging-api.ventia-latam.com/api/v1}
      NEXT_PUBLIC_MESSAGING_WS_URL: ${NEXT_PUBLIC_MESSAGING_WS_URL:-wss://staging-ws.ventia-latam.com/cable}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Messaging (Rails) ---
  messaging:
    build:
      context: ../../apps/messaging
      dockerfile: Dockerfile
      target: development
    container_name: ventia-messaging
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      RAILS_LOG_TO_STDOUT: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: messaging_db
      POSTGRES_USERNAME: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-change-me-in-production}
      CORS_ORIGINS: ${MESSAGING_CORS_ORIGINS:-https://staging.ventia-latam.com}
      MESSAGING_SERVICE_URL: ${MESSAGING_SERVICE_URL:-https://staging-ws.ventia-latam.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://staging.ventia-latam.com}
      # WhatsApp / Meta
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      WHATSAPP_CLOUD_BASE_URL: ${WHATSAPP_CLOUD_BASE_URL:-https://graph.facebook.com}
      # Firebase Admin (push notifications)
      FIREBASE_ADMIN_PROJECT_ID: ${FIREBASE_ADMIN_PROJECT_ID:-}
      FIREBASE_ADMIN_CLIENT_EMAIL: ${FIREBASE_ADMIN_CLIENT_EMAIL:-}
      FIREBASE_ADMIN_PRIVATE_KEY: ${FIREBASE_ADMIN_PRIVATE_KEY:-}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - messaging_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    command: sh -c "bin/rails db:prepare && bin/rails server -b 0.0.0.0 -p 3001"
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Sidekiq (Background Jobs) ---
  sidekiq:
    build:
      context: ../../apps/messaging
      dockerfile: Dockerfile
      target: development
    container_name: ventia-sidekiq
    environment:
      RAILS_ENV: ${RAILS_ENV:-development}
      RAILS_LOG_TO_STDOUT: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: messaging_db
      POSTGRES_USERNAME: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-https://staging.ventia-latam.com}
      MESSAGING_SERVICE_URL: ${MESSAGING_SERVICE_URL:-https://staging-ws.ventia-latam.com}
      # WhatsApp / Meta
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      WHATSAPP_CLOUD_BASE_URL: ${WHATSAPP_CLOUD_BASE_URL:-https://graph.facebook.com}
      # Firebase Admin (push notifications)
      FIREBASE_ADMIN_PROJECT_ID: ${FIREBASE_ADMIN_PROJECT_ID:-}
      FIREBASE_ADMIN_CLIENT_EMAIL: ${FIREBASE_ADMIN_CLIENT_EMAIL:-}
      FIREBASE_ADMIN_PRIVATE_KEY: ${FIREBASE_ADMIN_PRIVATE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - messaging_storage:/app/storage
    restart: unless-stopped
    command: bundle exec sidekiq
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  messaging_storage:
    driver: local
