# =============================================================================
# Ventia Staging — Nginx Reverse Proxy
# Installed on the VM directly (not in Docker)
# Copy to: /etc/nginx/sites-available/ventia-staging
# Symlink: ln -s /etc/nginx/sites-available/ventia-staging /etc/nginx/sites-enabled/
# =============================================================================

# --- HTTP → HTTPS redirect + ACME challenge ---
server {
    listen 80;
    server_name staging.ventia-latam.com staging-api.ventia-latam.com staging-ws.ventia-latam.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- staging.ventia-latam.com → Frontend (Next.js) ---
server {
    listen 443 ssl;
    server_name staging.ventia-latam.com;

    ssl_certificate /etc/letsencrypt/live/staging.ventia-latam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.ventia-latam.com/privkey.pem;

    client_max_body_size 50M;

    # ActiveStorage media files — proxy to messaging service
    location /rails/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# --- staging-api.ventia-latam.com → Backend (FastAPI) ---
server {
    listen 443 ssl;
    server_name staging-api.ventia-latam.com;

    ssl_certificate /etc/letsencrypt/live/staging-api.ventia-latam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-api.ventia-latam.com/privkey.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- staging-ws.ventia-latam.com → Messaging (Rails) ---
server {
    listen 443 ssl;
    server_name staging-ws.ventia-latam.com;

    ssl_certificate /etc/letsencrypt/live/staging-ws.ventia-latam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-ws.ventia-latam.com/privkey.pem;

    client_max_body_size 20M;

    # ActionCable WebSocket
    location /cable {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # WhatsApp webhooks + API
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
