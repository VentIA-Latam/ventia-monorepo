---
:verbose: false
:concurrency: <%= ENV.fetch("SIDEKIQ_CONCURRENCY", 10) %>
:timeout: 25
:max_retries: 3

:queues:
  - default
  - campaigns
  # Cola del cron-dispatcher (Campaigns::TriggerScheduledJob, ver sidekiq-cron.yml).
  # Aislada de :campaigns para que el dispatcher corra a tiempo aunque haya backlog
  # de envíos. NO REMOVER sin actualizar también queue_as del job y sidekiq-cron.yml.
  - scheduled
  - low
